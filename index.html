<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actor Codename Generator</title>
    <style>
        body {
            margin: 0;
            background-color: #003232;
            font-family: sans-serif;
            color: #DCFFDF;
        }
        .wrap {
            margin: 0 auto;
            padding: 10px;
            max-width: 600px;
            width: 80vw;
            min-height: 400px;
            background-color: #003232;
            position: relative;
            margin-top: 50px;
        }
        h1, h2, h3 {
            color: #00DC69;
        }
        h1 {
            margin-top: 0;
        }
        h2 {
            font-size: 20px;
        }
        form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: end;
            margin: 20px 0;
        }
        label {
            display: block;
            font-size: 0.92rem;
            margin-bottom: 6px;
        }
        select, input, button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 4px;
            border: 1px solid #0a7260;
            font-size: 1rem;
            background: #002a2a;
            color: #DCFFDF;
        }
        button {
            background: #00DC69;
            color: #003232;
            border-color: #00DC69;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #00c65e; }
        .status {
            min-height: 20px;
            margin: 6px 0 12px;
            color: #9cc9b6;
        }
        ul {
            margin: 0;
            padding-left: 18px;
        }
        li { margin: 6px 0; }
        .footer {
            font-style: italic;
            font-size: smaller;
            color: gray;
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            text-align: center;
        }
        @media (max-width: 680px) {
            .wrap { margin: 20px auto; width: 92vw; }
            form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <h1>Actor Codename Generator</h1>
        <p>Feline proper noun + D&amp;D/Pathfinder term, with alliterative matching.</p>

        <form id="generator-form">
            <div>
                <label for="style">Style</label>
                <select id="style" name="style">
                    <option value="random">Random</option>
                    <option value="class">Class</option>
                    <option value="location">Location</option>
                    <option value="plane">Plane</option>
                    <option value="deity">Deity</option>
                </select>
            </div>
            <div>
                <label for="count">Count (1-25)</label>
                <input id="count" name="count" type="number" min="1" max="25" value="10">
            </div>
            <div>
                <button type="submit">Generate</button>
            </div>
        </form>

        <div class="status" id="status">Loading data files...</div>
        <h2 id="result-title">Results</h2>
        <ul id="results"></ul>
        <div class="footer">
            <span id="combination-count">Calculating possible combinations...</span>
            &nbsp;|&nbsp;
            <a href="https://en.wikipedia.org/wiki/Category:Fictional_cats" target="_blank" rel="noopener noreferrer">Fictional cats source</a>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
